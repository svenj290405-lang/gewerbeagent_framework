services:
  postgres:
    image: postgres:16-alpine
    container_name: gewerbeagent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gewerbeagent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gewerbeagent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gewerbeagent"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  framework:
    image: python:3.12-slim
    container_name: gewerbeagent_framework
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    command: >
      bash -c "
      apt-get update && apt-get install -y --no-install-recommends curl &&
      pip install --no-cache-dir uv &&
      uv sync --frozen &&
      uv run alembic upgrade head &&
      uv run uvicorn core.api.app:app --host 0.0.0.0 --port 8001
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - web

  caddy:
    image: caddy:2-alpine
    container_name: gewerbeagent_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      - framework
    networks:
      - web

networks:
  internal:
  web:

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  caddy_logs:
