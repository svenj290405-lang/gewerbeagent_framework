services:
  postgres:
    image: postgres:16-alpine
    container_name: gewerbeagent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gewerbeagent
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: gewerbeagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gewerbeagent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: