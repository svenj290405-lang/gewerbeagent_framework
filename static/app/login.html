<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0066cc" />
  <title>Gewerbeagent — Anmelden</title>
  <link rel="icon" href="/app/static/icon.svg" />
  <link rel="manifest" href="/app/manifest.webmanifest" />
  <link rel="stylesheet" href="/app/static/app.css" />
</head>
<body class="login-body">
  <main class="login-card">
    <img src="/app/static/icon.svg" alt="" width="64" height="64" />
    <h1>Gewerbeagent</h1>

    <p id="msg" class="msg" role="status" aria-live="polite"></p>

    <!-- Passwort-Login (Standard) -->
    <form id="pw-form" method="post" action="/app/login/password">
      <label for="email">E-Mail</label>
      <input id="email" name="email" type="email" autocomplete="username"
             required placeholder="du@betrieb.de" />
      <label for="password">Passwort</label>
      <input id="password" name="password" type="password"
             autocomplete="current-password" required placeholder="••••••••" />
      <button type="submit">Anmelden</button>
    </form>

    <p class="muted" id="magic-toggle" style="margin-top:18px">
      Kein Passwort? <a href="#" id="show-magic">Link per E-Mail anfordern</a>
    </p>

    <!-- Magic-Link (Fallback, versteckt) -->
    <form id="magic-form" hidden>
      <label for="memail">E-Mail</label>
      <input id="memail" name="email" type="email" autocomplete="email"
             placeholder="du@betrieb.de" />
      <button type="submit" id="magic-btn">Login-Link senden</button>
    </form>

    <p class="muted" style="margin-top:24px;font-size:13px">
      App lädt nicht richtig? <a href="#" id="reset-app">App zurücksetzen</a>
    </p>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const msg = document.getElementById("msg");
    const fehler = params.get("fehler");
    if (fehler === "login") msg.textContent = "E-Mail oder Passwort falsch.";
    else if (fehler === "rate") msg.textContent = "Zu viele Versuche. Bitte kurz warten.";
    else if (fehler === "link") msg.textContent = "Der Link ist abgelaufen oder schon benutzt.";

    // Selbstheilung: alten Service-Worker + alle Caches wegwerfen und sauber neu
    // laden. Diese Seite wird NIE gecacht, läuft also immer frisch — darum kann
    // man sich hier zuverlässig aus einer hängengebliebenen Alt-Version befreien.
    // Aufruf per Link oder direkt über /app/login?reset=1 (bookmarkbar).
    async function resetApp() {
      msg.textContent = "App wird zurückgesetzt …";
      try {
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((r) => r.unregister()));
        }
        if (window.caches) {
          const keys = await caches.keys();
          await Promise.all(keys.map((k) => caches.delete(k)));
        }
      } catch (e) { /* best effort */ }
      location.replace("/app/login?frisch=" + Date.now());
    }
    document.getElementById("reset-app").addEventListener("click", (e) => {
      e.preventDefault(); resetApp();
    });
    if (params.get("reset") === "1") resetApp();

    document.getElementById("show-magic").addEventListener("click", (e) => {
      e.preventDefault();
      document.getElementById("pw-form").hidden = true;
      document.getElementById("magic-toggle").hidden = true;
      document.getElementById("magic-form").hidden = false;
      msg.textContent = "";
    });

    document.getElementById("magic-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("magic-btn");
      btn.disabled = true; msg.textContent = "Wird gesendet …";
      const body = new URLSearchParams({ email: document.getElementById("memail").value });
      try {
        const res = await fetch("/app/login", { method: "POST", body });
        const data = await res.json();
        msg.textContent = data.message || "Bitte E-Mail-Postfach prüfen.";
      } catch (err) {
        msg.textContent = "Es gab ein Problem. Bitte später erneut versuchen.";
      } finally { btn.disabled = false; }
    });
  </script>
</body>
</html>
